<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">My Tasks</h3>
      <div>
        <span class="me-2">Hello, Ahmed</span>
        <a class="btn btn-outline-danger btn-sm" href="#">Logout</a>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h5 class="mb-3">Add Task</h5>
        <form class="row g-2">
          <div class="col-md-5">
            <input class="form-control" placeholder="Task title" />
          </div>
          <div class="col-md-5">
            <input class="form-control" placeholder="Short description" />
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100">Add</button>
          </div>
        </form>
      </div>
    </div>

    <div class="alert alert-danger d-none">Error here</div>
    <div class="alert alert-success d-none">Success here</div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Study PHP</td>
                <td>Native + MySQLi</td>
                <td><span class="badge bg-warning text-dark">Pending</span></td>
                <td class="text-end">
                  <a class="btn btn-sm btn-success" href="#">Mark Done</a>
                  <a class="btn btn-sm btn-secondary" href="#">Edit</a>
                  <a class="btn btn-sm btn-danger" href="#">Delete</a>
                </td>
              </tr>
              <tr>
                <td>2</td>
                <td>Finish Homework</td>
                <td>CRUD tasks</td>
                <td><span class="badge bg-success">Done</span></td>
                <td class="text-end">
                  <a class="btn btn-sm btn-warning" href="#">Mark Pending</a>
                  <a class="btn btn-sm btn-secondary" href="#">Edit</a>
                  <a class="btn btn-sm btn-danger" href="#">Delete</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
